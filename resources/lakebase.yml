# Synced-table specs — the declarative YAML equivalent of T1's psycopg DDL.
# Each entry mirrors a gold Delta table into Lakebase Postgres.
#
# These can be created via UC `synced_database_tables` (DABs resource) once
# you wire the SDK calls. For the capstone the simpler path is to keep the
# T1-created tables and document the equivalent spec here for completeness.

resources:
  synced_database_tables:
    customers_synced:
      name: customers_synced
      database_instance_name: ${var.lakebase_instance}
      logical_database_name: ${var.lakebase_database}
      spec:
        source_table_full_name: ${var.catalog}.gold.customers
        primary_key_columns:
          - customer_id
        scheduling_policy: CONTINUOUS

    transactions_synced:
      name: transactions_synced
      database_instance_name: ${var.lakebase_instance}
      logical_database_name: ${var.lakebase_database}
      spec:
        source_table_full_name: ${var.catalog}.gold.transactions
        primary_key_columns:
          - transaction_id
        scheduling_policy: CONTINUOUS

    products_synced:
      name: products_synced
      database_instance_name: ${var.lakebase_instance}
      logical_database_name: ${var.lakebase_database}
      spec:
        source_table_full_name: ${var.catalog}.gold.products
        primary_key_columns:
          - product_id
        scheduling_policy: TRIGGERED
