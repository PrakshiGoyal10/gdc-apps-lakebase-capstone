resources:
  apps:
    customer360:
      name: ${var.app_name}
      description: "Customer 360 capstone — git-source app"

      # Git-source app: Databricks pulls from this repo on each `bundle run`.
      # See T8 doc — the alternative (source_code_path workspace upload) is
      # explicitly disallowed for capstone submission.
      git_repository:
        provider: github
        url: ${var.git_repo_url}

      git_source:
        branch: ${var.git_branch}
        source_code_path: "app"   # path INSIDE the repo

      user_api_scopes:
        - sql
        - dashboards.genie

      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE

        # Lakebase resource binding intentionally omitted on first deploy:
        # the app SP's Postgres role doesn't exist until after its first
        # connection, so granting CAN_CONNECT_AND_CREATE here errors with
        # "Role <SP-UUID> not found in instance capstone-pg". The app
        # connects to Lakebase via PGHOST / PGDATABASE env vars + the SDK's
        # generate_database_credential call — no binding needed.

        - name: genie-space
          genie_space:
            name: genie-space
            space_id: ${var.genie_space_id}
            permission: CAN_RUN

        - name: forward-etl-job
          job:
            id: ${resources.jobs.forward_etl.id}
            permission: CAN_MANAGE_RUN
